<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthBridge - Michel's Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div id="header">
        <h1>🏥 HealthBridge</h1>
        <p>Monitoring: <strong>Alain</strong></p>
    </div>

    <div id="status-bar">
        <span id="status-dot">🟢</span>
        <span id="status-text">Waiting for data...</span>
        <span id="last-update"></span>
    </div>

    <div id="map"></div>

    <div id="info-panel">

        <div class="info-card">
            <h3>📍 Last Location</h3>
            <p id="lat-lon">--</p>
            <p id="address">--</p>
        </div>

        <div class="info-card">
            <h3>🕐 Last Update</h3>
            <p id="time-ago">--</p>
            <p id="exact-time">--</p>
        </div>

        <div class="info-card">
            <h3>📡 Interval</h3>
            <p id="interval-info">--</p>
        </div>

    </div>

    <div id="controls">
        <button id="btn-request" onclick="requestNow()">
            📨 Request Now
        </button>
        <button id="btn-history" onclick="toggleHistory()">
            📋 Show History
        </button>
        <button id="btn-center" onclick="centerMap()">
            🎯 Center Map
        </button>
    </div>

    <!-- History Panel -->
    <div id="history-panel" class="hidden">
        <h3>📋 Location History</h3>
        <div id="history-list"></div>
    </div>

    <script src="app.js"></script>

</body>
</html>
